<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tati Moda Express | Checkout</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fffcfc; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass-card { background: white; border: 1px solid rgba(251, 113, 133, 0.1); }
        input, select, textarea { border: 1px solid #f3f4f6 !important; }
        input:focus, select:focus { border-color: #fb7185 !important; outline: none; ring: 0; }
    </style>
</head>
<body x-data="tatiStore()" class="min-h-screen pb-20">

    <header class="bg-white border-b border-rose-50 px-6 py-4 mb-8">
        <div class="container mx-auto text-center">
            <h1 class="serif text-2xl text-rose-400">Tati Moda Express</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-lg">
        
        <div x-show="view === 'catalog'" x-transition>
            <div class="grid gap-6">
                <template x-for="product in products" :key="product.id">
                    <div @click="selectProduct(product)" class="glass-card rounded-[2rem] overflow-hidden cursor-pointer shadow-sm hover:shadow-md transition-all">
                        <img :src="product.image" class="w-full h-48 object-cover">
                        <div class="p-6 text-center">
                            <h3 class="font-bold text-gray-800 uppercase text-sm tracking-widest" x-text="product.name"></h3>
                            <p class="text-rose-400 text-xs font-bold mt-2">PEDIR AHORA ✨</p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'checkout'" x-cloak x-transition>
            <button @click="view = 'catalog'" class="mb-6 flex items-center text-gray-400 text-[10px] font-bold uppercase tracking-widest">
                ← Volver al catálogo
            </button>

            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-rose-100/20">
                <h2 class="serif text-xl mb-6 text-gray-800 italic">Información de Envío</h2>

                <form action="https://api.sheetmonkey.io/form/q1FGsLP6yBKxFbro3sJ6xH" method="POST" @submit="handleSubmit">
                    
                    <input type="hidden" name="Fecha y Hora" value="x-sheetmonkey-current-date-time">
                    
                    <input type="hidden" name="Producto" :value="selectedProduct.name">

                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Nombre</label>
                            <input type="text" name="Nombre" required class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">WhatsApp</label>
                            <input type="tel" name="Whatsapp" required placeholder="3..." class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Departamento</label>
                                <select name="Departamento" x-model="form.dept" required class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm">
                                    <option value="">Elegir...</option>
                                    <template x-for="d in Object.keys(colombia)" :key="d">
                                        <option :value="d" x-text="d"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Ciudad</label>
                                <select name="Ciudad" required class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm">
                                    <template x-for="c in (colombia[form.dept] || ['Esperando...'])" :key="c">
                                        <option :value="c" x-text="c"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Direccion</label>
                            <input type="text" name="Direccion" placeholder="Calle, #, Casa" required class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Info_Adicional (Opcional)</label>
                            <input type="text" name="Info_Adicional" placeholder="Piso, Apto, Color..." class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                             <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Metodo de pago</label>
                                <select name="Metodo de pago" required class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm">
                                    <option>Contraentrega</option>
                                    <option>Pago en linea</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">cantidad</label>
                                <input type="number" name="cantidad" value="1" min="1" required class="w-full px-4 py-3 rounded-xl bg-gray-50 text-sm font-bold">
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-rose-400 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-rose-500 transition-all uppercase tracking-widest text-xs mt-6">
                            Realizar Pedido
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div x-show="view === 'success'" class="text-center py-20" x-cloak>
            <h2 class="serif text-3xl mb-4 text-rose-400">¡Pedido Enviado!</h2>
            <p class="text-gray-500 text-sm mb-10">En minutos te contactaremos para confirmar el envío.</p>
            <button @click="view = 'catalog'" class="bg-gray-900 text-white px-8 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Regresar</button>
        </div>
    </main>

    <script>
        function tatiStore() {
            return {
                view: 'catalog',
                selectedProduct: {},
                form: { dept: '' },
                products: [
                    { id: 1, name: 'NUBE TULIPANES INFINITOS', image: 'https://ugc.production.linktr.ee/079fafb7-a07d-416f-98db-5d548be7492b_image.png' },
                    { id: 2, name: 'CABELLO PERFECTO 4X1', image: 'https://ugc.production.linktr.ee/200b9fba-25e9-4b9a-8038-b0dee9de95ef_image.png' },
                    { id: 3, name: 'HUMIDIFICADOR FOGATA', image: 'https://ugc.production.linktr.ee/d26967e0-704c-4022-bf4a-782563466152_image.png' },
                    { id: 4, name: 'JORDAN AIR RETRO 1', image: 'https://ugc.production.linktr.ee/8c63c901-915e-4be2-96ea-cc92b6d4503d_image.png' }
                ],
                colombia: {
                    "Antioquia": ["Medellín", "Envigado", "Itagüí", "Rionegro"],
                    "Bogotá D.C.": ["Bogotá D.C."],
                    "Valle del Cauca": ["Cali", "Palmira", "Tuluá"],
                    "Atlántico": ["Barranquilla", "Soledad"],
                    "Cundinamarca": ["Soacha", "Chía"],
                    "Santander": ["Bucaramanga"],
                    "Risaralda": ["Pereira"],
                    "Quindío": ["Armenia"]
                },
                selectProduct(product) {
                    this.selectedProduct = product;
                    this.view = 'checkout';
                    window.scrollTo(0, 0);
                },
                handleSubmit() {
                    setTimeout(() => { this.view = 'success'; }, 800);
                }
            }
        }
    </script>
</body>
</html>
