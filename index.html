<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tati Moda Express | Premium Shop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fffcfc; color: #374151; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(251, 113, 133, 0.1); }
        .gradient-bg { background: linear-gradient(180deg, #fef2f2 0%, #fffcfc 100%); }
    </style>
</head>
<body x-data="tatiStore()" x-init="init()" class="gradient-bg min-h-screen">

    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-rose-50 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="serif text-2xl text-rose-400 leading-none">Tati Moda Express</h1>
                <p class="text-[9px] tracking-widest uppercase text-gray-400 font-bold">Premium Delivery</p>
            </div>
            <div class="bg-rose-50 px-3 py-1 rounded-full">
                <span class="text-[10px] text-rose-400 font-bold uppercase">Colombia 🇨🇴</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-lg">
        
        <div x-show="view === 'catalog'" x-transition>
            <h2 class="serif text-3xl mb-8 text-center text-gray-800">Colección Exclusiva</h2>
            <div class="grid gap-6">
                <template x-for="product in products" :key="product.id">
                    <div @click="selectProduct(product)" class="glass-card rounded-[2rem] overflow-hidden cursor-pointer active:scale-95 transition-transform">
                        <img :src="product.image" class="w-full h-64 object-cover">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-gray-800" x-text="product.name"></h3>
                                <span class="bg-rose-100 text-rose-500 text-[10px] px-2 py-1 rounded-lg font-bold uppercase" x-text="product.category"></span>
                            </div>
                            <p class="text-gray-400 text-xs font-light" x-text="product.description"></p>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-rose-400 text-xs font-bold uppercase tracking-tighter italic">Ver detalles →</span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'checkout'" x-cloak x-transition>
            <button @click="view = 'catalog'" class="mb-6 flex items-center text-gray-400 text-xs font-bold uppercase tracking-widest">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
                Volver a la tienda
            </button>

            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-rose-100/30">
                <h2 class="serif text-2xl mb-2 text-gray-800 italic">Finalizar Pedido</h2>
                <p class="text-xs text-gray-400 mb-8 font-medium">Estás pidiendo: <span class="text-rose-400 font-bold" x-text="selectedProduct.name"></span></p>

                <form action="https://api.sheetmonkey.io/form/q1FGsLP6yBKxFbro3sJ6xH" method="POST" @submit="handleSubmit">
                    <input type="hidden" name="Producto" :value="selectedProduct.name">
                    <input type="hidden" name="Fecha_Hora" value="x-sheetmonkey-current-date-time">

                    <div class="space-y-5">
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Nombre y Apellido</label>
                            <input type="text" name="Nombre" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-transparent text-sm focus:ring-rose-400">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">WhatsApp</label>
                                <input type="tel" name="WhatsApp" required placeholder="320..." class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-transparent text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Pago</label>
                                <select name="Metodo_Pago" class="w-full px-5 py-4 rounded-2xl bg-gray-50 text-sm appearance-none">
                                    <option>Contraentrega</option>
                                    <option>Pago en Línea</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Depto</label>
                                <select name="Departamento" x-model="form.dept" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 text-sm">
                                    <option value="">Elegir...</option>
                                    <template x-for="d in Object.keys(colombia)" :key="d">
                                        <option :value="d" x-text="d"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Ciudad</label>
                                <select name="Ciudad" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 text-sm">
                                    <template x-for="c in (colombia[form.dept] || ['Selecciona Depto'])" :key="c">
                                        <option :value="c" x-text="c"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Dirección Principal</label>
                            <input type="text" name="Direccion" placeholder="Calle, Carrera, Casa..." required class="w-full px-5 py-4 rounded-2xl bg-gray-50 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Info Adicional</label>
                            <input type="text" name="Info_Adicional" placeholder="Apto, color, indicaciones..." class="w-full px-5 py-4 rounded-2xl bg-gray-50 text-sm">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <select name="Cantidad" class="hidden"><option selected>1 unidad</option></select>
                            <select name="Oferta" class="hidden"><option selected>Envío Gratis</option></select>
                        </div>

                        <button type="submit" class="w-full bg-rose-400 text-white font-bold py-5 rounded-[2rem] shadow-xl shadow-rose-100 hover:bg-rose-500 transition-all uppercase tracking-widest text-xs mt-4">
                            ¡Confirmar Pedido! 🛍️
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div x-show="view === 'success'" class="text-center py-20 px-6" x-cloak>
            <div class="mb-8 text-rose-400 flex justify-center">
                <svg class="w-20 h-20" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            </div>
            <h2 class="serif text-4xl mb-4">¡Gracias!</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-10">Tu pedido ha sido registrado. En breve te contactaremos vía WhatsApp para coordinar la entrega.</p>
            <button @click="view = 'catalog'" class="bg-gray-900 text-white px-10 py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Seguir Comprando</button>
        </div>
    </main>

    <script>
        function tatiStore() {
            return {
                view: 'catalog',
                selectedProduct: {},
                form: { dept: '' },
                products: [
                    { id: 1, category: 'Tendencias', name: 'NUBE TULIPANES INFINITOS', image: 'https://ugc.production.linktr.ee/079fafb7-a07d-416f-98db-5d548be7492b_image.png', description: 'Luz ambiental de diseño exclusivo para el hogar.' },
                    { id: 2, category: 'Belleza', name: 'CABELLO PERFECTO 4X1', image: 'https://ugc.production.linktr.ee/200b9fba-25e9-4b9a-8038-b0dee9de95ef_image.png', description: 'Kit profesional boutique para cuidado capilar.' },
                    { id: 3, category: 'Hogar', name: 'HUMIDIFICADOR FOGATA', image: 'https://ugc.production.linktr.ee/d26967e0-704c-4022-bf4a-782563466152_image.png', description: 'Atmósfera relajante con tecnología ultrasónica.' },
                    { id: 4, category: 'Calzado', name: 'JORDAN AIR RETRO 1', image: 'https://ugc.production.linktr.ee/8c63c901-915e-4be2-96ea-cc92b6d4503d_image.png', description: 'Estilo icónico para un look premium diario.' },
                    { id: 5, category: 'Abrigos', name: 'BMW AZUL XDRIVE', image: 'https://ugc.production.linktr.ee/58ffd69e-c7bb-4e4a-ab3e-4e596bb51dbb_image.png', description: 'Abrigo técnico de alta gama edición limitada.' }
                ],
                colombia: {
                    "Antioquia": ["Medellín", "Envigado", "Itagüí", "Rionegro"],
                    "Bogotá D.C.": ["Bogotá D.C."],
                    "Valle del Cauca": ["Cali", "Palmira", "Tuluá"],
                    "Atlántico": ["Barranquilla", "Soledad"],
                    "Cundinamarca": ["Soacha", "Chía", "Zipaquirá"],
                    "Santander": ["Bucaramanga", "Floridablanca"],
                    "Risaralda": ["Pereira"],
                    "Quindío": ["Armenia"]
                },
                init() {
                    // Carga inicial
                },
                selectProduct(product) {
                    this.selectedProduct = product;
                    this.view = 'checkout';
                    window.scrollTo(0, 0);
                },
                handleSubmit() {
                    // Sheet Monkey procesa el envío
                    setTimeout(() => { this.view = 'success'; }, 800);
                }
            }
        }
    </script>
</body>
</html>
