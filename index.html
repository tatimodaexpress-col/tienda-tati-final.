<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tati Moda Express | Tienda Oficial</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfaf8; color: #374151; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .pastel-gradient { background: linear-gradient(135deg, #fffafa 0%, #fef2f2 100%); }
        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #fceef0; background: white; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(251, 113, 133, 0.1); }
        [x-cloak] { display: none !important; }
        select, input, textarea { border: 1px solid #fceef0 !important; transition: all 0.3s; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #fb7185 !important; ring: 2px rgba(251, 113, 133, 0.1); }
    </style>
</head>
<body x-data="shop()" x-init="init()">
    
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-rose-50">
        <div class="container mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="serif text-2xl text-rose-400 leading-none">Tati Moda Express</h1>
                <span class="text-[9px] tracking-[0.3em] uppercase text-gray-400 font-bold mt-1">Premium Selection Colombia</span>
            </div>
            <button @click="openCart = true" class="relative p-2 bg-rose-50 rounded-full text-rose-400 hover:bg-rose-400 hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
                <span x-show="cart.length > 0" x-text="cart.length" class="absolute -top-1 -right-1 bg-gray-800 text-white text-[10px] px-2 py-0.5 rounded-full"></span>
            </button>
        </div>
    </header>

    <section class="pastel-gradient py-16 px-6 border-b border-rose-50">
        <div class="container mx-auto text-center">
            <span class="text-rose-400 font-bold tracking-widest text-[10px] uppercase mb-3 block">Estilo Clean Luxury</span>
            <h2 class="serif text-4xl md:text-5xl text-gray-900 mb-4 leading-tight">Sofisticación en <br><span class="italic text-rose-300">cada detalle</span></h2>
            <p class="text-gray-500 max-w-xl mx-auto text-sm font-light">Explora nuestra colección exclusiva de tendencias, belleza y hogar con envío a toda Colombia.</p>
        </div>
    </section>

    <main class="container mx-auto px-6 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="product in products" :key="product.id">
                <div class="product-card rounded-[2rem] overflow-hidden flex flex-col group">
                    <div class="aspect-square bg-gray-50 overflow-hidden">
                        <img :src="product.image" :alt="product.name" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                    </div>
                    <div class="p-6">
                        <span class="text-[9px] font-bold text-rose-300 uppercase tracking-widest" x-text="product.category"></span>
                        <h3 class="text-gray-800 font-bold text-lg mt-1 mb-2" x-text="product.name"></h3>
                        <p class="text-gray-400 text-xs mb-6 font-light leading-relaxed" x-text="product.description"></p>
                        <button @click="addToCart(product)" class="w-full bg-gray-900 text-white py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-rose-400 transition-colors">
                            Añadir a mi bolsa
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="openCart" class="fixed inset-0 z-[60]" x-cloak>
        <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm" @click="openCart = false"></div>
        <div class="absolute inset-y-0 right-0 w-full max-w-lg bg-white shadow-2xl flex flex-col">
            
            <div class="p-6 border-b border-rose-50 flex justify-between items-center">
                <h2 class="serif text-2xl text-gray-800">Finalizar Pedido</h2>
                <button @click="openCart = false" class="text-gray-400 hover:text-rose-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex-grow overflow-y-auto p-6 space-y-8">
                <div class="space-y-4">
                    <template x-for="(item, index) in cart" :key="index">
                        <div class="flex items-center space-x-4 bg-rose-50/30 p-3 rounded-2xl border border-rose-100">
                            <img :src="item.image" class="w-12 h-12 object-cover rounded-lg">
                            <div class="flex-grow">
                                <h4 class="text-xs font-bold text-gray-800" x-text="item.name"></h4>
                                <p class="text-[9px] text-rose-400 uppercase font-bold" x-text="item.category"></p>
                            </div>
                            <button @click="removeFromCart(index)" class="text-gray-300 hover:text-rose-500">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </template>
                </div>

                <form action="https://api.sheetmonkey.io/form/q1FGsLP6yBKxFbro3sJ6xH" method="POST" @submit="isSubmitting = true" x-show="cart.length > 0">
                    <input type="hidden" name="Producto" :value="cart.map(i => i.name).join(', ')">
                    <input type="hidden" name="Fecha_Hora" value="x-sheetmonkey-current-date-time">

                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Nombre Completo</label>
                            <input type="text" name="Nombre" required class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">WhatsApp</label>
                                <input type="tel" name="WhatsApp" required class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Método de Pago</label>
                                <select name="Metodo_Pago" required class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                                    <option value="Contraentrega">Contraentrega</option>
                                    <option value="Pago en linea">Pago en línea</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Departamento</label>
                                <select name="Departamento" x-model="selectedDept" required class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                                    <option value="">Seleccionar...</option>
                                    <template x-for="dept in Object.keys(colombiaData)" :key="dept">
                                        <option :value="dept" x-text="dept"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Ciudad</label>
                                <select name="Ciudad" required class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                                    <option value="">Elegir ciudad...</option>
                                    <template x-for="city in (colombiaData[selectedDept] || [])" :key="city">
                                        <option :value="city" x-text="city"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Cantidad</label>
                                <select name="Cantidad" class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                                    <option>1 unidad</option><option>2 unidades</option><option>3 unidades</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Oferta</label>
                                <select name="Oferta" class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm text-rose-400 font-bold">
                                    <option>Precio Normal</option><option>Envío Gratis</option><option>Promo 2x1</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Dirección Principal</label>
                            <input type="text" name="Direccion" placeholder="Calle, Carrera, # Casa" required class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1 block">Info Específica (Opcional)</label>
                            <input type="text" name="Info_Adicional" placeholder="Apto, Piso, Color fachada..." class="w-full px-4 py-3 rounded-xl bg-gray-50/50 text-sm">
                        </div>

                        <button type="submit" class="w-full bg-rose-400 text-white font-bold py-5 rounded-2xl shadow-lg shadow-rose-100 hover:bg-rose-500 transition-all uppercase tracking-widest text-[10px] mt-6">
                           Confirmar Pedido Ahora ✨
                        </button>
                    </div>
                </form>

                <div x-show="cart.length === 0" class="text-center py-12">
                    <p class="text-gray-400 italic text-sm">Tu bolsa está vacía.</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-12 bg-white border-t border-rose-50 text-center">
        <p class="serif text-xl text-rose-300 italic mb-1">Tati Moda Express</p>
        <p class="text-[8px] tracking-[0.5em] uppercase text-gray-400 font-bold">Luxury Life & Style Colombia</p>
    </footer>

    <script>
        function shop() {
            return {
                openCart: false,
                isSubmitting: false,
                selectedDept: '',
                cart: [],
                products: [
                    { id: 1, category: 'Tendencias', name: 'NUBE TULIPANES INFINITOS', image: 'https://ugc.production.linktr.ee/079fafb7-a07d-416f-98db-5d548be7492b_image.png', description: 'Artesanía lumínica para espacios de lujo.' },
                    { id: 2, category: 'Belleza', name: 'CABELLO PERFECTO 4X1', image: 'https://ugc.production.linktr.ee/200b9fba-25e9-4b9a-8038-b0dee9de95ef_image.png', description: 'Tratamiento boutique de alto rendimiento.' },
                    { id: 3, category: 'Hogar', name: 'HUMIDIFICADOR FOGATA', image: 'https://ugc.production.linktr.ee/d26967e0-704c-4022-bf4a-782563466152_image.png', description: 'Ambientes cálidos con tecnología ultrasónica.' },
                    { id: 4, category: 'Calzado', name: 'JORDAN AIR RETRO 1', image: 'https://ugc.production.linktr.ee/8c63c901-915e-4be2-96ea-cc92b6d4503d_image.png', description: 'Icono de la moda urbana premium.' },
                    { id: 5, category: 'Abrigos', name: 'BMW AZUL XDRIVE', image: 'https://ugc.production.linktr.ee/58ffd69e-c7bb-4e4a-ab3e-4e596bb51dbb_image.png', description: 'Protección y estilo Racing de alta gama.' },
                    { id: 6, category: 'Tendencias', name: 'BMW NEGRO COMPETIZIONE', image: 'https://ugc.production.linktr.ee/dff77405-2d89-4f13-9b77-b1382780a9fb_image.png', description: 'Detalles automotrices de colección.' }
                ],
                colombiaData: {
                    "Antioquia": ["Medellín", "Envigado", "Itagüí", "Bello", "Rionegro"],
                    "Bogotá D.C.": ["Bogotá D.C."],
                    "Valle del Cauca": ["Cali", "Palmira", "Buga", "Tuluá"],
                    "Atlántico": ["Barranquilla", "Soledad", "Puerto Colombia"],
                    "Santander": ["Bucaramanga", "Floridablanca", "Girón"],
                    "Bolívar": ["Cartagena", "Turbaco"],
                    "Cundinamarca": ["Soacha", "Chía", "Zipaquirá", "Funza"],
                    "Huila": ["Neiva", "Pitalito"],
                    "Nariño": ["Pasto", "Ipiales"],
                    "Risaralda": ["Pereira", "Dosquebradas"],
                    "Quindío": ["Armenia", "Calarcá"],
                    "Meta": ["Villavicencio"],
                    "Tolima": ["Ibagué"],
                    "Cesar": ["Valledupar"],
                    "Córdoba": ["Montería"],
                    "Magdalena": ["Santa Marta"],
                    "Norte de Santander": ["Cúcuta"],
                    "Sucre": ["Sincelejo"]
                },
                init() {
                    const saved = localStorage.getItem('tati_cart');
                    if (saved) this.cart = JSON.parse(saved);
                },
                addToCart(product) {
                    this.cart = [product]; // Solo permitimos un tipo de producto a la vez para simplificar el pedido
                    localStorage.setItem('tati_cart', JSON.stringify(this.cart));
                    this.openCart = true;
                },
                removeFromCart(index) {
                    this.cart.splice(index, 1);
                    localStorage.setItem('tati_cart', JSON.stringify(this.cart));
                }
            }
        }
    </script>
</body>
</html>
