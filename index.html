<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tati Moda Express | Premium Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body x-data="tatiStore()" class="antialiased">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-rose-50 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div @click="view = 'catalog'" class="cursor-pointer">
                <h1 class="serif text-xl text-rose-400 font-bold">Tati Moda Express</h1>
            </div>
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold uppercase tracking-widest text-gray-400">Pedidos Abiertos</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-lg">
        
        <div x-show="view === 'catalog'" class="fade-in space-y-6">
            <header class="text-center mb-8">
                <p class="text-[10px] font-bold text-rose-300 uppercase tracking-[0.3em] mb-2">Colección 2026</p>
                <h2 class="serif text-3xl text-gray-800 italic">Tendencias que enamoran</h2>
            </header>

            <div class="grid gap-6">
                <template x-for="product in products" :key="product.id">
                    <div @click="selectProduct(product)" class="product-card rounded-[2.5rem] overflow-hidden group">
                        <div class="relative overflow-hidden aspect-[4/5]">
                            <img :src="product.image" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                            <div class="absolute bottom-4 left-4 right-4">
                                <div class="bg-white/90 backdrop-blur p-4 rounded-2xl flex justify-between items-center shadow-lg">
                                    <div>
                                        <h3 class="font-bold text-gray-800 text-sm uppercase tracking-tighter" x-text="product.name"></h3>
                                        <p class="text-[10px] text-rose-400 font-bold uppercase">Envío Gratis Hoy</p>
                                    </div>
                                    <span class="bg-gray-900 text-white p-2 rounded-full">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'checkout'" x-cloak class="fade-in">
            <button @click="view = 'catalog'" class="mb-6 flex items-center text-gray-400 text-[10px] font-bold uppercase tracking-widest">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
                Regresar
            </button>

            <div class="bg-white p-8 rounded-[3rem] shadow-2xl shadow-rose-100/50 border border-rose-50">
                <div class="text-center mb-8">
                    <h2 class="serif text-2xl text-gray-800 italic">Datos de Entrega</h2>
                    <p class="text-[10px] text-gray-400 font-medium mt-2">Paga al recibir en tu casa</p>
                </div>

                <form action="https://api.sheetmonkey.io/form/q1FGsLP6yBKxFbro3sJ6xH" method="POST" @submit="handleSubmit">
                    
                    <input type="hidden" name="Fecha y Hora" value="x-sheetmonkey-current-date-time">
                    <input type="hidden" name="Producto" :value="selectedProduct.name">

                    <div class="space-y-5">
                        <div class="group">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">Nombre Completo</label>
                            <input type="text" name="Nombre" required class="w-full px-5 py-4 rounded-2xl bg-gray-50/50 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">WhatsApp</label>
                            <input type="tel" name="Whatsapp" required placeholder="3..." class="w-full px-5 py-4 rounded-2xl bg-gray-50/50 text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">Departamento</label>
                                <select name="Departamento" x-model="form.dept" required class="w-full px-4 py-4 rounded-2xl bg-gray-50/50 text-sm">
                                    <option value="">Elegir...</option>
                                    <template x-for="d in Object.keys(colombia)" :key="d">
                                        <option :value="d" x-text="d"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">Ciudad</label>
                                <select name="Ciudad" required class="w-full px-4 py-4 rounded-2xl bg-gray-50/50 text-sm">
                                    <template x-for="c in (colombia[form.dept] || ['Seleccione...'])" :key="c">
                                        <option :value="c" x-text="c"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">Dirección</label>
                            <input type="text" name="Direccion" placeholder="Calle, Carrera, # Casa/Apto" required class="w-full px-5 py-4 rounded-2xl bg-gray-50/50 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">Info Adicional</label>
                            <input type="text" name="Info_Adicional" placeholder="Piso, color, indicaciones..." class="w-full px-5 py-4 rounded-2xl bg-gray-50/50 text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">Método de pago</label>
                                <select name="Metodo de pago" required class="w-full px-4 py-4 rounded-2xl bg-gray-50/50 text-sm font-semibold">
                                    <option>Contraentrega</option>
                                    <option>Pago en linea</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1.5 ml-1 block">Cantidad</label>
                                <input type="number" name="cantidad" value="1" min="1" required class="w-full px-5 py-4 rounded-2xl bg-gray-50/50 text-sm font-bold text-center">
                            </div>
                        </div>

                        <button type="submit" class="btn-submit w-full text-white font-bold py-5 rounded-[2rem] transition-all uppercase tracking-[0.2em] text-[10px] mt-6">
                            Confirmar Pedido Ahora ✨
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div x-show="view === 'success'" class="fade-in text-center py-20 px-6" x-cloak>
            <div class="inline-flex p-6 bg-rose-50 rounded-full text-rose-400 mb-6">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="serif text-4xl mb-4 text-gray-800 italic">¡Orden Lista!</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-10 font-light">Estamos preparando tu envío. Te enviaremos el número de guía por WhatsApp.</p>
            <button @click="view = 'catalog'" class="bg-gray-900 text-white px-12 py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-rose-400 transition-all">Ver más productos</button>
        </div>
    </main>

    <script>
        function tatiStore() {
            return {
                view: 'catalog',
                selectedProduct: {},
                form: { dept: '' },
                products: [
                    { id: 1, name: 'NUBE TULIPANES INFINITOS', image: 'https://ugc.production.linktr.ee/079fafb7-a07d-416f-98db-5d548be7492b_image.png' },
                    { id: 2, name: 'CABELLO PERFECTO 4X1', image: 'https://ugc.production.linktr.ee/200b9fba-25e9-4b9a-8038-b0dee9de95ef_image.png' },
                    { id: 3, name: 'HUMIDIFICADOR FOGATA', image: 'https://ugc.production.linktr.ee/d26967e0-704c-4022-bf4a-782563466152_image.png' },
                    { id: 4, name: 'JORDAN AIR RETRO 1', image: 'https://ugc.production.linktr.ee/8c63c901-915e-4be2-96ea-cc92b6d4503d_image.png' }
                ],
                colombia: {
                    "Antioquia": ["Medellín", "Envigado", "Itagüí", "Rionegro", "Bello"],
                    "Bogotá D.C.": ["Bogotá D.C."],
                    "Valle del Cauca": ["Cali", "Palmira", "Tuluá", "Jamundí"],
                    "Atlántico": ["Barranquilla", "Soledad", "Puerto Colombia"],
                    "Santander": ["Bucaramanga", "Floridablanca", "Girón"],
                    "Cundinamarca": ["Soacha", "Chía", "Zipaquirá"],
                    "Bolívar": ["Cartagena", "Turbaco"],
                    "Risaralda": ["Pereira", "Dosquebradas"],
                    "Quindío": ["Armenia"]
                },
                selectProduct(product) {
                    this.selectedProduct = product;
                    this.view = 'checkout';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },
                handleSubmit() {
                    setTimeout(() => { this.view = 'success'; }, 1000);
                }
            }
        }
    </script>
</body>
</html>
