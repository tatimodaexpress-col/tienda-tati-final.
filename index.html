<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tati Moda Express | Premium Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="tatiStore()" class="antialiased bg-[#fffcfc]">

    <div x-show="showNotification" x-transition.duration.500ms 
         class="fixed bottom-6 left-4 z-[100] bg-white/90 backdrop-blur-xl border border-rose-100 p-3 rounded-2xl shadow-2xl flex items-center space-x-3 max-w-[280px]">
        <div class="relative">
            <img :src="activeNotif.img" class="w-12 h-12 rounded-lg object-cover">
            <div class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
        </div>
        <div>
            <p class="text-[10px] text-gray-500 leading-tight">
                <span class="font-bold text-gray-800" x-text="activeNotif.user"></span> de <span x-text="activeNotif.city"></span><br>
                compró <span class="text-rose-400 font-bold" x-text="activeNotif.prod"></span>
            </p>
            <p class="text-[9px] text-gray-400 mt-0.5" x-text="activeNotif.time"></p>
        </div>
    </div>

    <div class="bg-black text-white text-[9px] font-bold py-2 text-center uppercase tracking-[0.2em]">
        🔥 MEGA LIQUIDACIÓN: TERMINA EN <span x-text="countdown"></span>
    </div>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-rose-50 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="serif text-xl text-rose-400 font-bold tracking-tight">Tati Moda Express</h1>
            <div class="bg-rose-50 px-3 py-1 rounded-full flex items-center">
                <span class="w-1.5 h-1.5 bg-rose-400 rounded-full animate-ping mr-2"></span>
                <span class="text-[9px] font-bold text-rose-400 uppercase">En Vivo</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-lg">
        
        <div x-show="view === 'catalog'" class="fade-in space-y-8">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="product in products" :key="product.id">
                    <div @click="selectProduct(product)" class="product-card group relative">
                        <div class="relative aspect-[3/4] rounded-[2rem] overflow-hidden shadow-sm bg-white">
                            <img :src="product.image" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                            
                            <div class="absolute top-3 left-3 flex flex-col gap-1">
                                <span class="bg-white/90 backdrop-blur px-2 py-1 rounded-full text-[8px] font-black uppercase tracking-tighter shadow-sm" 
                                      :class="product.badgeClass" x-text="product.badge"></span>
                            </div>

                            <div class="absolute bottom-3 left-3 right-3">
                                <div class="bg-white/90 backdrop-blur-md p-3 rounded-xl shadow-sm">
                                    <h3 class="font-bold text-gray-800 text-[10px] uppercase truncate" x-text="product.name"></h3>
                                    <div class="flex justify-between items-end mt-1">
                                        <p class="text-rose-500 font-bold text-xs" x-text="product.price"></p>
                                        <div class="flex items-center text-[8px] text-gray-400">
                                            <svg class="w-2 h-2 text-yellow-400 mr-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                            <span x-text="product.rating"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'checkout'" x-cloak class="fade-in">
            </div>
    </main>

    <script>
        function tatiStore() {
            return {
                view: 'catalog',
                countdown: '02:17:28',
                showNotification: false,
                activeNotif: {},
                products: [
                    { id: 1, name: 'Nube Tulipanes Infinitos', price: '$89.900', image: 'https://ugc.production.linktr.ee/079fafb7-a07d-416f-98db-5d548be7492b_image.png', badge: 'Viral', badgeClass: 'text-rose-500', rating: '4.9 (1.2k)' },
                    { id: 2, name: 'Humidificador Fogata 🔥', price: '$99.900', image: 'https://ugc.production.linktr.ee/d26967e0-704c-4022-bf4a-782563466152_image.png', badge: 'Más Vendido', badgeClass: 'text-orange-500', rating: '5.0 (840)' },
                    { id: 3, name: 'Pop Puck Anti-estrés', price: '$79.900', image: 'https://ugc.production.linktr.ee/5c23e852-598e-4a81-8072-f199d3d3a681_image.png', badge: 'Tendencia', badgeClass: 'text-blue-500', rating: '4.8 (310)' },
                    { id: 4, name: 'Combo Cabello Perfecto 4x1', price: '$149.900', image: 'https://ugc.production.linktr.ee/200b9fba-25e9-4b9a-8038-b0dee9de95ef_image.png', badge: 'Oferta', badgeClass: 'text-green-500', rating: '4.9 (2.1k)' },
                    { id: 5, name: 'Nike Jordan Air Retro 1', price: '$149.900', image: 'https://ugc.production.linktr.ee/8c63c901-915e-4be2-96ea-cc92b6d4503d_image.png', badge: 'VIP', badgeClass: 'text-purple-500', rating: '5.0 (540)' },
                    { id: 6, name: 'Adidas Samba Black', price: '$139.900', image: 'https://ugc.production.linktr.ee/62e2454a-714c-4731-9257-814e59f42602_image.png', badge: 'Últimas', badgeClass: 'text-red-500', rating: '4.7 (1.1k)' }
                ],
                // ... (Lógica de notificaciones falsas y selección de producto) ...
            }
        }
    </script>
</body>
</html>
